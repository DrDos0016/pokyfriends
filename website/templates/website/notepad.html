{% load static %}
<!DOCTYPE html>
<html lang="en-us">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="/static/global/favicon.png">
<link rel="stylesheet" type="text/css" href="{% static 'global/style.css'  %}?{{TS}}">
<title>Pokyfriends - {% block title %}{{title}}{% endblock %}</title>

<style>
body
{
    display:flex;
    flex-direction:column;
    background-color:#AAA;
    height:100vh;
    align-items:center;
    justify-content:center;
    font-size:18pt;
}

body > * { width:95vw; margin:auto; }

#form {
    flex: 0 0 80px;
    text-align:center;
}

#form input { font-size:36pt; }

#notepad { flex: 1; background-color:#DFF; padding:4px; max-height:80vh; overflow:auto;}

body > footer { flex: 0 0 50px; background:#CCC; text-align:center; }

p { margin:8px 4px 8px 4px; padding-left:20px; border-bottom:1px solid #000; }

.bulk-edit
{
    flex: 1; background-color:#FDD; padding:4px; max-height:80vh; overflow:auto; height:80vh; width:80vw; font-size:14pt;
}
</style>
</head>

<body>
{% if not editing %}
<section id="form">
<form method="POST">
{% csrf_token %}
<input type="text" name="text">
<input type="submit" value="Add">
</form>
</section>
<section id="notepad">
{{notepad|default:"Empty notepad"|urlize|linebreaks}}
</section>
<footer>
    <a href="?edit">Bulk Edit</a>
</footer>
{% else %}
<section id="form">
    <form method="POST" action="/notepad/">
    {% csrf_token %}
    <textarea class="bulk-edit" name="bulk">{{notepad}}</textarea>
    <input type="submit" value="Save">
    </form>
</section>
{% endif %}
</body>

</html>
